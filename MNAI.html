<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>牦牛AI-九班人自己的AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ---------- 启动画面 ---------- */
    #startup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #000 0%, #330000 15%, #660000 30%, #990000 45%, #cc0000 60%, #ff3300 75%, #ff6b35 85%, #ff8e53 95%, #ffb085 100%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .particle-field {
      position: absolute;
      width: 100%;
      height: 100%;
      perspective: 1000px;
      transform-style: preserve-3d;
    }

    .particle-3d {
      position: absolute;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #fff 30%, #ff6b35 100%);
      border-radius: 50%;
      animation: float3d 15s linear infinite;
      box-shadow: 0 0 20px #ff6b35;
    }

    .energy-vortex {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, transparent 0%, rgba(255, 107, 53, 0.1) 30%, rgba(255, 107, 53, 0.3) 50%, rgba(255, 107, 53, 0.5) 70%, transparent 100%);
      animation: vortexSpin 20s linear infinite;
      filter: blur(20px);
    }

    .quantum-ring {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 4px solid;
      border-image: linear-gradient(45deg, #ff3300, #ff6b35, #ff8e53, #ff6b35, #ff3300) 1;
      border-radius: 50%;
      animation: quantumPulse 4s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 107, 53, 0.7));
    }

    .quantum-ring:nth-child(2) {
      width: 250px;
      height: 250px;
      animation-delay: 1s;
      animation-duration: 5s;
    }

    .quantum-ring:nth-child(3) {
      width: 200px;
      height: 200px;
      animation-delay: 2s;
      animation-duration: 6s;
    }

    .yak-core {
      position: relative;
      width: 300px;
      height: 300px;
      margin-bottom: 50px;
    }

    .core-rotation {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: coreRotate 20s linear infinite;
    }

    .core-particle {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #fff, #ff6b35);
      border-radius: 50%;
      filter: blur(2px);
      box-shadow: 0 0 20px #ff6b35;
    }

    .yak-symbol {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 100px;
      animation: yakPulse 3s ease-in-out infinite;
      text-shadow: 0 0 50px #ff6b35, 0 0 100px #ff3300, 0 0 150px #cc0000;
    }

    .data-stream {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .stream-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff6b35, #ff8e53, #ff6b35, transparent);
      animation: streamFlow 8s linear infinite;
      filter: blur(1px);
    }

    .launch-title {
      color: white;
      font-size: 64px;
      font-weight: bold;
      margin-bottom: 25px;
      text-shadow: 0 0 40px rgba(255, 107, 53, 1), 0 0 80px rgba(255, 107, 53, 0.8), 0 0 120px rgba(255, 107, 53, 0.5);
      animation: titlePulse 3s ease-in-out infinite;
      text-align: center;
      letter-spacing: 4px;
      font-family: 'Microsoft YaHei', '黑体', sans-serif;
    }

    .launch-subtitle {
      color: rgba(255, 255, 255, 0.95);
      font-size: 28px;
      margin-bottom: 50px;
      text-align: center;
      animation: subtitleFloat 4s ease-in-out infinite;
      font-weight: 300;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    }

    .class-matrix {
      width: 90%;
      max-width: 700px;
      height: 200px;
      margin: 40px auto;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 107, 53, 0.3);
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
    }

    .matrix-content {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 30px;
      animation: matrixScroll 30s linear infinite;
    }

    .matrix-item {
      color: white;
      font-size: 16px;
      background: linear-gradient(45deg, rgba(255, 107, 53, 0.1), rgba(255, 142, 83, 0.05));
      padding: 12px 20px;
      border-radius: 15px;
      border: 1px solid rgba(255, 107, 53, 0.2);
      text-align: center;
      backdrop-filter: blur(5px);
    }

    .quantum-loader {
      width: 400px;
      margin-top: 40px;
    }

    .loader-text {
      color: rgba(255, 255, 255, 0.9);
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
      animation: textGlow 2s ease-in-out infinite;
    }

    .loader-bar {
      width: 100%;
      height: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .quantum-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #330000, #660000, #990000, #cc0000, #ff3300, #ff6b35, #ff8e53, #ffb085);
      border-radius: 6px;
      width: 0%;
      background-size: 400% 100%;
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
      animation: loading 6s cubic-bezier(0.4, 0, 0.2, 1) forwards, gradientShift 4s ease-in-out infinite;
    }

    .loader-glow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: glowMove 2s linear infinite;
    }

    /* ---------- 关闭动画 ---------- */
    #shutdown {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 2000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .shutdown-container {
      position: relative;
      width: 300px;
      height: 300px;
    }

    .implosion-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid #ff6b35;
      border-radius: 50%;
      animation: implode 2s ease-out forwards;
      box-shadow: 0 0 50px rgba(255, 107, 53, 0.7);
    }

    .particle-explosion {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .explosion-particle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #ff6b35;
      border-radius: 50%;
      animation: explodeParticle 1.5s ease-out forwards;
    }

    .goodbye-text {
      color: #ff6b35;
      font-size: 48px;
      margin-top: 50px;
      font-weight: bold;
      animation: fadeOut 2s ease-out 1s forwards;
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
    }

    /* ---------- 主应用界面 ---------- */
    #app {
      display: none;
      width: 100%;
      flex: 1;
      flex-direction: column;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    }

    .app-header {
      background: linear-gradient(135deg, #8b0000 0%, #cc0000 25%, #ff3300 50%, #ff6b35 75%, #ff8e53 100%);
      padding: 20px 30px;
      text-align: center;
      color: white;
      box-shadow: 0 5px 30px rgba(255, 107, 53, 0.5);
      position: relative;
      flex-shrink: 0;
    }

    .app-header h1 {
      font-size: 36px;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .app-header .subtitle {
      font-size: 20px;
      opacity: 0.95;
      margin-top: 10px;
      font-weight: 300;
    }

    .footer-support {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.75);
      color: rgba(255, 255, 255, 0.7);
      padding: 12px 20px;
      text-align: center;
      font-size: 14px;
      z-index: 100;
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 107, 53, 0.4);
      flex-shrink: 0;
    }

    .footer-support span {
      color: #ffb085;
      font-weight: bold;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      max-width: 950px;
      margin: 0 auto;
      padding: 20px 15px 80px;
      width: 100%;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 107, 53, 0.15);
      min-height: 55vh;
      max-height: 70vh;
      scroll-behavior: smooth;
    }

    .message {
      margin-bottom: 20px;
      padding: 15px 20px;
      border-radius: 18px;
      max-width: 85%;
      animation: messageAppear 0.4s ease-out;
      line-height: 1.5;
      position: relative;
      word-wrap: break-word;
    }

    .message.ai {
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.15), rgba(255, 142, 83, 0.08));
      color: #ffd8c9;
      margin-right: auto;
      border-left: 4px solid #ff6b35;
      box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.3);
    }

    .message.ai::before {
      content: '🐂';
      position: absolute;
      left: -40px;
      font-size: 20px;
    }

    .message.user {
      background: linear-gradient(135deg, rgba(74, 144, 226, 0.15), rgba(100, 170, 250, 0.08));
      color: #c9e2ff;
      margin-left: auto;
      border-right: 4px solid #4a90e2;
      box-shadow: -5px 5px 20px rgba(0, 0, 0, 0.3);
    }

    .message.user::before {
      content: '👤';
      position: absolute;
      right: -40px;
      font-size: 20px;
    }

    .input-container {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      gap: 10px;
    }

    .message-input {
      flex: 1;
      padding: 14px 22px;
      border: 2px solid rgba(255, 107, 53, 0.45);
      border-radius: 30px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }

    .message-input:focus {
      border-color: #ff6b35;
      box-shadow: 0 0 20px rgba(255, 107, 53, 0.4);
    }

    .send-btn {
      background: linear-gradient(135deg, #ff6b35, #ff8e53);
      border: none;
      color: white;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
      white-space: nowrap;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 107, 53, 0.4);
    }

    .exit-section {
      display: flex;
      justify-content: center;
      margin-top: 15px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .exit-btn {
      background: linear-gradient(135deg, #ff0000 0%, #ff3333 25%, #ff6666 50%, #ff9999 75%, #ffcccc 100%);
      padding: 20px 60px;
      font-size: 24px;
      border: 4px solid rgba(255, 255, 255, 0.6);
      border-radius: 40px;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
      letter-spacing: 3px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.7), 0 5px 20px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
      animation: exitBtnGlow 2s ease-in-out infinite alternate;
      width: 100%;
      max-width: 400px;
    }

    .exit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: exitShine 3s linear infinite;
    }

    .exit-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 0 60px rgba(255, 0, 0, 0.9), 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .exit-btn:active {
      transform: translateY(-2px) scale(1.02);
    }

    /* ---------- 状态动画 ---------- */
    .thinking-animation {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
    }

    .thinking-dot {
      width: 8px;
      height: 8px;
      background: #ff6b35;
      border-radius: 50%;
      animation: thinkingWave 1.4s ease-in-out infinite;
    }

    .thinking-dot:nth-child(1) { animation-delay: 0s; }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    .searching-status,
    .organizing-status,
    .reading-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      color: #ffb085;
      font-style: italic;
    }

    .searching-dot,
    .organizing-dot,
    .reading-dot {
      width: 6px;
      height: 6px;
      background: #ffb085;
      border-radius: 50%;
      animation: searchingPulse 1.2s ease-in-out infinite;
    }

    .organizing-dot {
      background: #ff6b35;
      animation: organizingPulse 1.3s ease-in-out infinite;
    }

    .typing-container {
      position: relative;
    }

    .typing-cursor {
      display: inline-block;
      width: 3px;
      height: 1.2em;
      background: #ff6b35;
      margin-left: 2px;
      animation: blinkCursor 1s step-end infinite;
      vertical-align: middle;
    }

    /* 图片消息样式 */
    .image-message img {
      max-width: 100%;
      border-radius: 16px;
      margin-top: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(255, 107, 53, 0.4);
      background: #111;
      display: block;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .image-message img:hover {
      transform: scale(1.02);
    }

    .image-actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .image-btn {
      background: rgba(255, 107, 53, 0.2);
      border: 1px solid rgba(255, 107, 53, 0.5);
      color: #ffb085;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(4px);
    }

    .image-btn:hover {
      background: rgba(255, 107, 53, 0.4);
      border-color: #ff8e53;
      color: white;
    }

    .attribution {
      font-size: 0.8rem;
      color: #ffb085;
      margin-top: 6px;
      opacity: 0.9;
    }

    /* 图片预览遮罩 */
    .image-preview-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 3000;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }

    .image-preview-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(255, 107, 53, 0.6);
      border: 3px solid rgba(255, 107, 53, 0.5);
    }

    @keyframes float3d {
      0% { transform: translateZ(-1000px) rotateX(0deg) rotateY(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateZ(1000px) rotateX(720deg) rotateY(360deg); opacity: 0; }
    }

    @keyframes vortexSpin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    @keyframes quantumPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    @keyframes coreRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes yakPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      50% { transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }
    }

    @keyframes streamFlow {
      0% { transform: translateX(-100%) translateY(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(100%) translateY(100vh); opacity: 0; }
    }

    @keyframes titlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes subtitleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes matrixScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    @keyframes textGlow {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes glowMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @keyframes implode {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }

    @keyframes explodeParticle {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes messageAppear {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes exitBtnGlow {
      0% { box-shadow: 0 0 40px rgba(255, 0, 0, 0.7); }
      100% { box-shadow: 0 0 50px rgba(255, 0, 0, 0.9); }
    }

    @keyframes exitShine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes thinkingWave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes searchingPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    @keyframes organizingPulse {
      0%, 100% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes blinkCursor {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @keyframes loading {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .launch-title { font-size: 40px; }
      .launch-subtitle { font-size: 20px; }
      .yak-core { width: 200px; height: 200px; }
      .yak-symbol { font-size: 70px; }
      .class-matrix { height: 150px; }
      .quantum-loader { width: 300px; }
      .chat-container { padding: 10px 10px 70px; }
      .messages { padding: 15px; min-height: 50vh; max-height: 55vh; }
      .message { padding: 12px 15px; max-width: 92%; }
      .message.ai::before, .message.user::before { display: none; }
      .exit-btn { padding: 18px 30px; font-size: 20px; max-width: 300px; }
      .app-header h1 { font-size: 28px; }
      .app-header .subtitle { font-size: 16px; }
      .footer-support { font-size: 12px; padding: 10px; }
      .input-wrapper { flex-direction: column; }
      .send-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="startup">
    <div class="energy-vortex" style="top: 10%; left: 5%;"></div>
    <div class="energy-vortex" style="bottom: 10%; right: 5%; animation-delay: 3s;"></div>
    <div class="quantum-ring" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
    <div class="quantum-ring" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
    <div class="quantum-ring" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
    <div class="particle-field" id="particleField"></div>
    <div class="data-stream" id="dataStream"></div>
    <div class="yak-core">
      <div class="core-rotation" id="coreRotation"></div>
      <div class="yak-symbol">🐂</div>
    </div>
    <h1 class="launch-title">牦牛AI</h1>
    <div class="launch-subtitle">九班人自己的AI · 专为九班而生</div>
    <div class="class-matrix">
      <div class="matrix-content" id="matrixContent"></div>
    </div>
    <div class="quantum-loader">
      <div class="loader-text">启动牦牛AI核心系统...</div>
      <div class="loader-bar">
        <div class="quantum-progress"></div>
        <div class="loader-glow"></div>
      </div>
    </div>
  </div>

  <div id="shutdown">
    <div class="shutdown-container">
      <div class="implosion-ring"></div>

              return { isImage: true, prompt: match[1].trim() };
            }
          }
          return { isImage: false };
        }

        findNameInMessage(message) {
          const sortedKeys = Object.keys(this.nicknameMap).sort((a, b) => b.length - a.length);
          for (const nickname of sortedKeys) {
            if (nickname.length <= 1) continue;
            const lowerNickname = nickname.toLowerCase();
            if (lowerNickname.length === 1) continue;
            const exactMatch = new RegExp(`(^|[^\\u4e00-\\u9fa5])${lowerNickname}([^\\u4e00-\\u9fa5]|$)`, 'i');
            if (exactMatch.test(message)) {
              const info = this.nicknameMap[nickname];
              return { found: true, nickname: nickname, fullName: info.fullName, type: info.type };
            }
          }
          return { found: false };
        }

        isMathCalculation(message) {
          const hasNumbers = /\d/.test(message);
          const hasOperators = /[+\-*/%^=]/.test(message);
          if (hasNumbers && (hasOperators || message.includes('等于') || message.includes('='))) {
            try {
              let expr = message.replace(/[^0-9+\-*/%^.()\s]/g, '');
              expr = expr.replace(/×/g, '*').replace(/÷/g, '/');
              if (expr.length > 0 && expr.length < 50) {
                const result = Function(`"use strict"; return (${expr})`)();
                if (!isNaN(result) && isFinite(result)) {
                  return { isMath: true, expression: expr, result: result };
                }
              }
            } catch (e) {}
          }
          return { isMath: false };
        }

        isGreeting(message) {
          const greetings = ['你好', 'hi', 'hello', '嗨', '在吗', '您好', '哈喽', '嘿'];
          return greetings.some(greet => message.includes(greet));
        }

        isWhoQuestion(message) {
          const whoPatterns = ['你谁', '你是谁', 'who are you', '你是哪个', '你是什么'];
          return whoPatterns.some(pattern => message.includes(pattern));

        async getSearchAnswer(question) {
          try {
            const cacheKey = question.toLowerCase();
            if (this.searchCache[cacheKey]) return this.searchCache[cacheKey];
            let searchResult = '';
            const searchEngines = [this.searchGoogle, this.searchBaidu, this.searchBing, this.searchDuckDuckGo, this.searchSogou];
            const searchPromises = [];
            for (let i = 0; i < Math.min(3, searchEngines.length); i++) {
              searchPromises.push(searchEngines[i](question).catch(e => ''));
            }
            const results = await Promise.all(searchPromises);
            for (const result of results) {
              if (result && result.length > searchResult.length) searchResult = result;
            }
            if (!searchResult || searchResult.length < 30) searchResult = await this.searchBackupAPI(question);
            if (!searchResult || searchResult.length < 30) return this.getSmartAnswer(question);
            const organizedAnswer = this.formatAsPoints(searchResult, question);
            this.searchCache[cacheKey] = organizedAnswer;
            if (Object.keys(this.searchCache).length > 50) delete this.searchCache[Object.keys(this.searchCache)[0]];
            return organizedAnswer;
          } catch (error) {
            return this.getSmartAnswer(question);
          }
        }

        async searchGoogle(question) {
          try {
            const proxyUrl = 'https://api.allorigins.win/get?url=';
            const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(question)}&hl=zh-CN`;
            const response = await fetch(proxyUrl + encodeURIComponent(searchUrl), { method: 'GET', headers: { 'User-Agent': 'Mozilla/5.0' } });
            if (response.ok) {
              const data = await response.json();
              const html = data.contents;
              const resultRegex = /<div class="[^"]*?VwiC3b[^"]*"[^>]*>([^<]+)<\/div>/g;
              const results = [];
              let match;
              while ((match = resultRegex.exec(html)) !== null && results.length < 3) {
                const content = match[1].replace(/<[^>]+>/g, ' ').trim();
                if (content.length > 30) results.push(content);
              }
              if (results.length > 0) return results.join(' ');
            }
            return '';
          } catch (error) { return ''; }
        }

        async searchBaidu(question) {
          try {
            const proxyUrl = 'https://api.allorigins.win/get?url=';
            const searchUrl = `https://www.baidu.com/s?wd=${encodeURIComponent(question)}&ie=utf-8`;
            const response = await fetch(proxyUrl + encodeURIComponent(searchUrl), { method: 'GET', headers: { 'User-Agent': 'Mozilla/5.0' } });
            if (response.ok) {
              const data = await response.json();
              const html = data.contents;
              const resultRegex = /<div class="result[^"]*"[^>]*>([\s\S]*?)<\/div>/gi;
              const results = [];
              let match;
              while ((match = resultRegex.exec(html)) !== null && results.length < 3) {
                const content = match[1].replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
                if (content.length > 50 && !content.includes('广告')) results.push(content);
              }
              if (results.length > 0) return results.join(' ');
            }
            return '';
          } catch (error) { return ''; }
        }

        async searchBing(question) {
          try {
            const response = await fetch(`https://www.bing.com/search?q=${encodeURIComponent(question)}&cc=CN`, { method: 'GET', headers: { 'User-Agent': 'Mozilla/5.0' }, mode: 'no-cors' });
            if (response.ok) {
              const text = await response.text();
              const bodyText = text.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, ' ').replace(/<style[^>]*>[\s\S]*?<\/style>/gi, ' ').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
              const keywords = question.split(' ');
              let relevantText = '';
              for (const keyword of keywords) {
                if (keyword.length > 2) {
                  const regex = new RegExp(`.{0,100}${keyword}.{0,100}`, 'gi');
                  const matches = bodyText.match(regex);
                  if (matches) relevantText += matches.slice(0, 2).join(' ') + ' ';
                }
              }
              if (relevantText.length > 50) return relevantText.substring(0, 300);
            }
            return '';
          } catch (error) { return ''; }
        }

        async searchDuckDuckGo(question) {
          try {
            const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(question)}&format=json&no_html=1&skip_disambig=1`, { method: 'GET', headers: { 'Accept': 'application/json', 'User-Agent': 'Mozilla/5.0' } });
            if (response.ok) {
              const data = await response.json();
              if (data.AbstractText) return data.AbstractText;
              if (data.RelatedTopics && data.RelatedTopics.length > 0) return data.RelatedTopics.slice(0, 2).map(topic => topic.Text || '').filter(text => text).join('。');
            }
            return '';
          } catch (error) { return ''; }
        }

        async searchSogou(question) {
          try {
            const response = await fetch(`https://www.sogou.com/web?query=${encodeURIComponent(question)}`, { method: 'GET', headers: { 'User-Agent': 'Mozilla/5.0' }, mode: 'no-cors' });
            if (response.ok) {
              const text = await response.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(text, 'text/html');
              const results = doc.querySelectorAll('.vr-title, .str_info');
              if (results.length > 0) return Array.from(results).slice(0, 2).map(el => el.textContent).join(' ');
            }
            return '';
          } catch (error) { return ''; }
        }

        async searchBackupAPI(question) {
          try {
            const response = await fetch(`https://v.juhe.cn/weixin/query?pno=1&ps=1&dtype=&key=b8daa4326fd5cc2a9a4c14c5013dd82d&word=${encodeURIComponent(question)}`, { method: 'GET', headers: { 'User-Agent': 'Mozilla/5.0' } });
            if (response.ok) {
              const data = await response.json();
              if (data.result && data.result.list && data.result.list.length > 0) {
                const firstResult = data.result.list[0];
                return firstResult.title + '。' + (firstResult.content || '');
              }
            }
            return '';
          } catch (error) { return ''; }
        }

        formatAsPoints(content, question) {
          if (!content || content.length < 20) return `关于"${question}"：\n\n根据搜索到的信息：\n${content.substring(0, 200)}...`;
          content = content.replace(/[\r\n\t]/g, ' ').replace(/\s+/g, ' ').trim();
          const sentences = content.split(/[。！？；\.!\?;]/).filter(s => s.trim().length > 10 && s.trim().length < 150).map(s => s.trim());
          if (sentences.length === 0) return `关于"${question}"：\n\n搜索到的信息：\n${content.substring(0, 250)}...`;
          const questionWords = question.toLowerCase().split(' ');
          const scoredSentences = sentences.map(sentence => {
            let score = 0;
            const lowerSentence = sentence.toLowerCase();
            for (const word of questionWords) {
              if (word.length > 2 && lowerSentence.includes(word)) score += 5;
            }
            score += Math.min(sentence.length / 50, 2);
            return { sentence, score };
          });
          const topSentences = scoredSentences.sort((a, b) => b.score - a.score).slice(0, 3).filter(item => item.score > 0 || item.sentence.length > 20).map(item => item.sentence);
          if (topSentences.length === 0) {
            const relevantSentences = sentences.slice(0, Math.min(3, sentences.length));
            return `关于"${question}"：\n\n1. ${relevantSentences[0]}\n2. ${relevantSentences[1] || relevantSentences[0]}\n3. ${relevantSentences[2] || '更多信息建议查阅相关资料'}`;
          }
          let points = '';
          topSentences.forEach((sentence, index) => { points += `${index + 1}. ${sentence}\n`; });
          return `关于"${question}"，搜索整理如下：\n\n${points}\n\n（信息来源于网络搜索）`;
        }

        getSmartAnswer(question) {

          else if (lowerQuestion.includes('日期') || lowerQuestion.includes('今天几号')) return `今天是：${now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}`;
          else if (lowerQuestion.includes('天气')) return `关于天气信息，建议您查看手机天气应用或访问中国天气网获取实时天气预报。`;

          else if (lowerQuestion.includes('学习') || lowerQuestion.includes('作业')) return `学习建议：认真听讲、及时复习、多问多练。如果有具体的学习问题，可以咨询相关科目的老师。`;

      async function saveImage(imgSrc, prompt) {
        try {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.src = imgSrc;
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
          });
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `牦牛AI_${prompt.substring(0, 20)}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, 'image/png');
        } catch (e) {
          alert('保存失败，请右键图片另存为。');
        }
      }

      async function displayGeneratedImage(prompt) {
        const container = document.getElementById('messageContainer');
        const imageDiv = document.createElement('div');
        imageDiv.className = 'message ai image-message';
        imageDiv.innerHTML = `
          <div><strong>🎨 正在生成图片…</strong></div>
          <div class="image-loading" style="display:flex; align-items:center; gap:10px; padding:10px 0;">
            <div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>
            <span>AI 正在创作“${prompt}”</span>
          </div>
        `;
        container.appendChild(imageDiv);
        container.scrollTop = container.scrollHeight;

        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = generateImageUrl(prompt);
        img.alt = prompt;

        img.onload = () => {
          imageDiv.innerHTML = `
            <div><strong>🖼️ 生成结果：</strong> ${prompt}</div>
            <img src="${img.src}" alt="${prompt}" class="generated-image" style="max-width:100%; border-radius:16px; margin-top:10px; cursor:pointer;" />
            <div class="image-actions">
              <button class="image-btn preview-btn">🔍 放大预览</button>
              <button class="image-btn save-btn">💾 保存到相册</button>
            </div>
            <div class="attribution">✨ 由牦牛AI生成</div>
          `;
          imageDiv.querySelector('.generated-image').addEventListener('click', () => openImagePreview(img.src));
          imageDiv.querySelector('.preview-btn').addEventListener('click', () => openImagePreview(img.src));
          imageDiv.querySelector('.save-btn').addEventListener('click', () => saveImage(img.src, prompt));
          container.scrollTop = container.scrollHeight;
        };

        img.onerror = () => {
          imageDiv.innerHTML = `
            <div><strong>⚠️ 图片生成失败</strong></div>
            <div>描述：${prompt}</div>
            <div style="color:#ffb085;">请稍后重试，或尝试更简洁的描述词。</div>
          `;
          container.scrollTop = container.scrollHeight;
        };
      }

      // ---------- 发送消息（整合图片生成）----------
      async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (!message) return;

        addMessage('user', message);
        input.value = '';

        const analysis = smartAI.analyze(message);

        // 图片生成分支
        if (analysis.isImageGeneration.isImage) {
          showThinking();
          await new Promise(resolve => setTimeout(resolve, 600));
          hideThinking();
          displayGeneratedImage(analysis.isImageGeneration.prompt);
          return;
        }

        // 普通对话
        showThinking();
        const thinkTime = 800 + Math.random() * 1200;
        await new Promise(resolve => setTimeout(resolve, thinkTime));
        hideThinking();

        const response = await smartAI.generateResponse(analysis);
        addMessage('ai', response);
      }

      function showShutdown() {
        if (!confirm('确定要退出牦牛AI系统吗？')) return;
        const shutdown = document.getElementById('shutdown');
        shutdown.style.display = 'flex';
        createExplosionParticles();
        setTimeout(() => {
          alert('感谢使用牦牛AI！期待下次再见，九班同学！');
          window.close();
        }, 2000);
      }

      // ---------- 启动 ----------
      document.addEventListener('DOMContentLoaded', function() {
        create3DParticleField();
        createDataStream();
        createCoreParticles();
        createClassMatrix();

        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('exitButton').addEventListener('click', showShutdown);
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
          if (e.key === 'Enter') sendMessage();
        });

        setTimeout(() => {
          const startup = document.getElementById('startup');
          const app = document.getElementById('app');
          const progressBar = document.querySelector('.quantum-progress');
          progressBar.style.width = '100%';
          setTimeout(() => {
            startup.style.opacity = '0';
            startup.style.transition = 'opacity 0.7s ease';
            setTimeout(() => {
              startup.style.display = 'none';
              app.style.display = 'flex';
              setTimeout(() => {
                const welcomeMsg = "你好！我是牦牛AI，专属于八年级九班同学的智能助手！我们班有62位同学，在王贵强老师带领下，学习氛围特别浓厚。有什么问题尽管问我！🐂";
                addMessage('ai', welcomeMsg);
                function adjustLayout() {
                  const messages = document.getElementById('messageContainer');
                  const header = document.querySelector('.app-header');
                  const footer = document.getElementById('footerSupport');
                  const input = document.querySelector('.input-container');
                  const exit = document.querySelector('.exit-section');
                  if (messages && header && footer && input && exit) {
                    const windowHeight = window.innerHeight;
                    const headerHeight = header.offsetHeight;
                    const footerHeight = footer.offsetHeight;
                    const inputHeight = input.offsetHeight;
                    const exitHeight = exit.offsetHeight;
                    const padding = 40;
                    messages.style.maxHeight = (windowHeight - headerHeight - footerHeight - inputHeight - exitHeight - padding) + 'px';
                  }
                }
                window.addEventListener('resize', adjustLayout);
                adjustLayout();
              }, 100);
            }, 700);
          }, 800);
        }, 1500);
      });
    })();
  </script>
</body>
</html>
